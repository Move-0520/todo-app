<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>待办清单</title>
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      color: #1e293b;
    }

    /* ===== Container ===== */
    .container {
      max-width: 640px;
      margin: 40px auto;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }

    /* ===== Header ===== */
    header { text-align: center; margin-bottom: 32px; }
    header h1 { font-size: 2rem; font-weight: 700; color: #1e293b; margin-bottom: 4px; }
    header p { color: #94a3b8; font-size: 0.95rem; }

    /* ===== Add Form ===== */
    .add-form { display: flex; gap: 12px; margin-bottom: 28px; }
    .add-form input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .add-form input:focus { border-color: #667eea; }
    .add-form button {
      padding: 12px 24px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .add-form button:hover { background: #5a67d8; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(102,126,234,0.4); }
    .add-form button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ===== Filter Bar ===== */
    .filter-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .filter-buttons { display: flex; gap: 6px; }
    .filter-btn {
      padding: 6px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      background: white;
      color: #64748b;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover { border-color: #667eea; color: #667eea; }
    .filter-btn.active { background: #667eea; color: white; border-color: #667eea; }
    .filter-count { font-size: 0.85rem; color: #94a3b8; }
    .filter-count strong { color: #667eea; }

    /* ===== Todo List ===== */
    .todo-list { display: flex; flex-direction: column; gap: 8px; }
    .todo-empty {
      text-align: center;
      padding: 48px 20px;
      color: #94a3b8;
    }
    .todo-empty .icon { font-size: 3rem; margin-bottom: 8px; }
    .todo-empty p { font-size: 1.05rem; }

    /* ===== Todo Item ===== */
    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: white;
      border: 1.5px solid #f1f5f9;
      border-radius: 12px;
      transition: all 0.2s;
    }
    .todo-item:hover { border-color: #e2e8f0; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .todo-item.completed { opacity: 0.7; }

    /* Checkbox */
    .checkbox {
      width: 22px; height: 22px;
      border: 2px solid #cbd5e1;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: all 0.2s;
    }
    .checkbox:hover { border-color: #667eea; }
    .checkbox.checked { background: #22c55e; border-color: #22c55e; }
    .checkbox.checked::after {
      content: "✓";
      color: white;
      font-size: 13px;
      font-weight: bold;
    }

    /* Title */
    .todo-title {
      flex: 1;
      font-size: 1rem;
      color: #1e293b;
      cursor: pointer;
      word-break: break-word;
    }
    .todo-item.completed .todo-title { text-decoration: line-through; color: #94a3b8; }

    /* Edit input */
    .edit-input {
      flex: 1;
      padding: 6px 10px;
      border: 2px solid #667eea;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
    }

    /* Action buttons */
    .actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.2s; }
    .todo-item:hover .actions { opacity: 1; }
    .action-btn {
      padding: 6px;
      background: none;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: #94a3b8;
      transition: all 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .action-btn.edit:hover { background: #eef2ff; color: #667eea; }
    .action-btn.delete:hover { background: #fef2f2; color: #ef4444; }

    /* ===== Footer ===== */
    footer { text-align: center; margin-top: 24px; padding-top: 20px; border-top: 1px solid #f1f5f9; }
    .clear-btn {
      background: none; border: none;
      color: #94a3b8; font-size: 0.85rem;
      cursor: pointer; transition: color 0.2s;
    }
    .clear-btn:hover { color: #ef4444; }

    /* ===== Toast ===== */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1e293b; color: white;
      padding: 12px 24px; border-radius: 12px;
      font-size: 0.9rem;
      opacity: 0; transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }

    /* ===== Error Banner ===== */
    .error-banner {
      display: none;
      padding: 12px 16px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 12px;
      color: #dc2626;
      font-size: 0.9rem;
      margin-bottom: 16px;
    }
    .error-banner.show { display: flex; justify-content: space-between; align-items: center; }
    .error-banner button { background: none; border: none; color: #dc2626; cursor: pointer; text-decoration: underline; font-size: 0.9rem; }

    /* ===== Loading ===== */
    .loading {
      text-align: center; padding: 40px; color: #94a3b8;
    }
    .spinner {
      display: inline-block;
      width: 28px; height: 28px;
      border: 3px solid #e2e8f0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== Responsive ===== */
    @media (max-width: 640px) {
      .container { padding: 24px 16px; margin: 20px auto; border-radius: 16px; }
      header h1 { font-size: 1.5rem; }
      .add-form { flex-direction: column; }
      .add-form button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header>
      <h1>📋 待办清单</h1>
      <p>管理你的日常任务，提高效率</p>
    </header>

    <!-- Error -->
    <div class="error-banner" id="errorBanner">
      <span id="errorText"></span>
      <button onclick="loadTodos()">重试</button>
    </div>

    <!-- Add Form -->
    <form class="add-form" id="addForm">
      <input type="text" id="addInput" placeholder="添加新的待办事项..." autofocus />
      <button type="submit" id="addBtn">添加</button>
    </form>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <div class="filter-buttons">
        <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">全部</button>
        <button class="filter-btn" data-filter="active" onclick="setFilter('active')">进行中</button>
        <button class="filter-btn" data-filter="completed" onclick="setFilter('completed')">已完成</button>
      </div>
      <span class="filter-count" id="filterCount"></span>
    </div>

    <!-- Todo List -->
    <div id="todoList" class="todo-list">
      <div class="loading">
        <div class="spinner"></div>
        <p>加载中...</p>
      </div>
    </div>

    <!-- Footer -->
    <footer id="footer" style="display:none">
      <button class="clear-btn" onclick="clearCompleted()">清除已完成事项</button>
    </footer>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ===== State =====
    let todos = [];
    let currentFilter = "all";

    // ===== DOM refs =====
    const todoList = document.getElementById("todoList");
    const addForm = document.getElementById("addForm");
    const addInput = document.getElementById("addInput");
    const addBtn = document.getElementById("addBtn");
    const errorBanner = document.getElementById("errorBanner");
    const errorText = document.getElementById("errorText");
    const filterCount = document.getElementById("filterCount");
    const footer = document.getElementById("footer");
    const toast = document.getElementById("toast");

    // ===== API Helpers =====
    async function api(method, path, body) {
      const opts = { method, headers: { "Content-Type": "application/json" } };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(path, opts);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "请求失败");
      return data;
    }

    // ===== Toast =====
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2500);
    }

    // ===== Load Todos =====
    async function loadTodos() {
      todoList.innerHTML = '<div class="loading"><div class="spinner"></div><p>加载中...</p></div>';
      errorBanner.classList.remove("show");

      try {
        todos = await api("GET", "/api/todos");
        render();
      } catch (e) {
        errorText.textContent = "无法加载待办事项：" + e.message;
        errorBanner.classList.add("show");
        todoList.innerHTML = '<div class="todo-empty"><div class="icon">😢</div><p>加载失败</p></div>';
      }
    }

    // ===== Add Todo =====
    addForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const title = addInput.value.trim();
      if (!title) return;

      addBtn.disabled = true;
      addBtn.textContent = "添加中...";

      try {
        const todo = await api("POST", "/api/todos", { title });
        todos.unshift(todo);
        addInput.value = "";
        addInput.focus();
        render();
        showToast("✅ 添加成功");
      } catch (e) {
        showToast("❌ " + e.message);
      } finally {
        addBtn.disabled = false;
        addBtn.textContent = "添加";
      }
    });

    // ===== Toggle =====
    async function toggleTodo(id) {
      const todo = todos.find(t => t.id === id);
      if (!todo) return;
      try {
        const updated = await api("PUT", `/api/todos/${id}`, { completed: !todo.completed });
        Object.assign(todo, updated);
        render();
      } catch (e) {
        showToast("❌ " + e.message);
      }
    }

    // ===== Delete =====
    async function deleteTodo(id) {
      if (!confirm("确定删除这个待办事项吗？")) return;
      try {
        await api("DELETE", `/api/todos/${id}`);
        todos = todos.filter(t => t.id !== id);
        render();
        showToast("🗑️ 已删除");
      } catch (e) {
        showToast("❌ " + e.message);
      }
    }

    // ===== Edit =====
    async function saveEdit(id, newTitle) {
      const trimmed = newTitle.trim();
      if (!trimmed) return;
      try {
        const updated = await api("PUT", `/api/todos/${id}`, { title: trimmed });
        const todo = todos.find(t => t.id === id);
        if (todo) Object.assign(todo, updated);
        render();
      } catch (e) {
        showToast("❌ " + e.message);
      }
    }

    function startEdit(id) {
      const todo = todos.find(t => t.id === id);
      if (!todo || todo.completed) return;

      // Find the todo element and replace title with input
      const items = document.querySelectorAll(".todo-item");
      for (const item of items) {
        const idAttr = item.dataset.id;
        if (parseInt(idAttr) === id) {
          const titleEl = item.querySelector(".todo-title");
          const oldTitle = titleEl.textContent;
          const input = document.createElement("input");
          input.type = "text";
          input.className = "edit-input";
          input.value = oldTitle;

          const finishEdit = (save) => {
            if (save && input.value.trim()) {
              saveEdit(id, input.value);
            } else {
              render();
            }
          };

          input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") finishEdit(true);
            if (e.key === "Escape") finishEdit(false);
          });
          input.addEventListener("blur", () => finishEdit(true));

          titleEl.replaceWith(input);
          input.focus();
          input.select();
          break;
        }
      }
    }

    // ===== Clear Completed =====
    async function clearCompleted() {
      const completed = todos.filter(t => t.completed);
      if (completed.length === 0) return;
      if (!confirm(`确定清除 ${completed.length} 项已完成事项？`)) return;

      for (const t of completed) {
        try {
          await api("DELETE", `/api/todos/${t.id}`);
        } catch { /* skip */ }
      }
      todos = todos.filter(t => !t.completed);
      render();
      showToast("🧹 已清除完成事项");
    }

    // ===== Filter =====
    function setFilter(filter) {
      currentFilter = filter;
      document.querySelectorAll(".filter-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.filter === filter);
      });
      render();
    }

    // ===== Render =====
    function render() {
      const filtered = todos.filter(t => {
        if (currentFilter === "active") return !t.completed;
        if (currentFilter === "completed") return t.completed;
        return true;
      });

      // Stats
      const active = todos.filter(t => !t.completed).length;
      const done = todos.filter(t => t.completed).length;
      filterCount.innerHTML = active > 0
        ? `还剩 <strong>${active}</strong> 项待完成`
        : todos.length > 0
        ? `全部完成 🎉`
        : "";

      footer.style.display = done > 0 ? "block" : "none";

      // Empty state
      if (filtered.length === 0) {
        const emoji = currentFilter === "all" ? "📝" : currentFilter === "active" ? "🎉" : "📭";
        const msg = currentFilter === "all"
          ? "还没有待办事项，添加一个吧！"
          : currentFilter === "active"
          ? "所有事项都已完成！太棒了 🎉"
          : "还没有已完成的事项";
        todoList.innerHTML = `<div class="todo-empty"><div class="icon">${emoji}</div><p>${msg}</p></div>`;
        return;
      }

      // Render items
      todoList.innerHTML = filtered.map(t => `
        <div class="todo-item ${t.completed ? "completed" : ""}" data-id="${t.id}">
          <div class="checkbox ${t.completed ? "checked" : ""}" onclick="toggleTodo(${t.id})"></div>
          <span class="todo-title" ondblclick="startEdit(${t.id})">${escapeHtml(t.title)}</span>
          <div class="actions">
            ${!t.completed ? `
              <button class="action-btn edit" onclick="startEdit(${t.id})" title="编辑">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                </svg>
              </button>
            ` : ""}
            <button class="action-btn delete" onclick="deleteTodo(${t.id})" title="删除">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
              </svg>
            </button>
          </div>
        </div>
      `).join("");
    }

    function escapeHtml(text) {
      const d = document.createElement("div");
      d.textContent = text;
      return d.innerHTML;
    }

    // ===== Init =====
    loadTodos();
  </script>
</body>
</html>
